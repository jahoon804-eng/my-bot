name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool libltdl-dev openjdk-17-jdk unzip wget
          pip install buildozer cython
      - name: Install Android build-tools
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk
          wget https://dl.google.com/android/repository/build-tools_r34-linux.zip
          unzip build-tools_r34-linux.zip -d $HOME/.buildozer/android/platform/android-sdk/build-tools/
          mv $HOME/.buildozer/android/platform/android-sdk/build-tools/android-* $HOME/.buildozer/android/platform/android-sdk/build-tools/34.0.0
      - name: Build
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: bin/*.apk
